<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{{ title or "AI-Based Rockfall Prediction System" }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  </head>
  <body>
    <div class="bg-image"></div>
    <div class="bg-overlay"></div>
    <header class="container site-header">
      <h1 class="title text-balance">AI-Based Rockfall Prediction and Alert System</h1>
      <nav class="nav">
        <a href="{{ url_for('index') }}">Dashboard</a>
        <a href="{{ url_for('weather_page') }}">Weather</a>
        <a href="#alerts">Alerts</a>
        <a href="#reports">Reports</a>
      </nav>
    </header>

    <main class="container">
      {% block content %}{% endblock %}
    </main>

    <footer class="container site-footer">
      <p>© {{ year or 2025 }} Rockfall Safety · Built with Flask</p>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}" defer></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
